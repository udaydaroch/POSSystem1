server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React router — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services
    location /api/auth/ {
        proxy_pass http://prism-auth:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/inventory/ {
        proxy_pass http://prism-inventory:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/pos/ {
        proxy_pass http://prism-pos:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
