# ── In-cluster PostgreSQL (demo only) ─────────────────────────────────────────
# Replaces external RDS for the EKS demo environment.
# Uses emptyDir storage — data is ephemeral but that's fine for a demo.
# Flyway in each service handles schema creation automatically on startup.

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: prism
data:
  init.sql: |
    CREATE DATABASE prism_auth;
    CREATE DATABASE prism_inventory;
    CREATE DATABASE prism_pos;

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: prism
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: prism-db-secret
                  key: db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prism-db-secret
                  key: db-password
            - name: POSTGRES_DB
              value: prism
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "prism"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: prism
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
