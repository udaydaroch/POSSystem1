spring:
  application:
    name: pos-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/prism_pos}
    username: ${DB_USER:prism}
    password: ${DB_PASSWORD:prism}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32-chars}
  expiration-ms: 86400000   # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.prism: DEBUG
    org.springframework.security: INFO

# URL of the inventory service (for stock validation)
services:
  inventory-url: ${INVENTORY_SERVICE_URL:http://inventory-service:8081}
