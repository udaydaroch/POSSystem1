spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/prism_auth}
    username: ${DB_USER:prism}
    password: ${DB_PASSWORD:prism}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-32-chars}
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
