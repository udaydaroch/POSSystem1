# ── Mini Prism CI/CD Pipeline ─────────────────────────────────────────────────
# Triggers on push to main.
# 1. Runs tests
# 2. Builds Docker images (backend + frontend) and pushes to ECR
# 3. Applies Terraform changes
# 4. Rolls out new images to EKS

name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  EKS_CLUSTER: mini-prism-dev

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Test pos-service
        run: mvn test -f services/pos-service/pom.xml

      - name: Test inventory-service
        run: mvn test -f services/inventory-service/pom.xml

      - name: Test auth-service
        run: mvn test -f services/auth-service/pom.xml

  # ── Job 2: Build & Push to ECR ──────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (short commit SHA)
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push backend services
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          for service in pos-service inventory-service auth-service; do
            echo "Building $service..."
            docker build \
              -t $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG \
              -t $ECR_REGISTRY/mini-prism/$service:latest \
              ./services/$service
            docker push $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG
            docker push $ECR_REGISTRY/mini-prism/$service:latest
            echo "$service pushed successfully"
          done

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          echo "Building frontend..."
          docker build \
            -t $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/mini-prism/frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/mini-prism/frontend:latest
          echo "frontend pushed successfully"

  # ── Job 3: Terraform ────────────────────────────────────────────────────────
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: build-and-push
    defaults:
      run:
        working-directory: terraform/envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Terraform apply
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"

  # ── Job 4: Deploy to Kubernetes ─────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Apply namespace and services
        run: kubectl apply -f kubernetes/services/services.yaml

      - name: Update Kubernetes secrets
        env:
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
        run: |
          kubectl create secret generic prism-db-secret \
            --from-literal=pos-db-url="jdbc:postgresql://$RDS_ENDPOINT:5432/prism_pos" \
            --from-literal=inventory-db-url="jdbc:postgresql://$RDS_ENDPOINT:5432/prism_inventory" \
            --from-literal=auth-db-url="jdbc:postgresql://$RDS_ENDPOINT:5432/prism_auth" \
            --from-literal=db-username="prism" \
            --from-literal=db-password="$DB_PASSWORD" \
            -n prism --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic prism-jwt-secret \
            --from-literal=jwt-secret="$JWT_SECRET" \
            -n prism --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply all deployments
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG:    ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          # Substitute placeholders and apply
          for f in kubernetes/deployments/*.yaml; do
            sed "s|ACCOUNT_ID.dkr.ecr.ap-southeast-2.amazonaws.com|$ECR_REGISTRY|g; s|IMAGE_TAG|$IMAGE_TAG|g" $f \
              | kubectl apply -f -
          done

      - name: Apply ingress
        run: kubectl apply -f kubernetes/ingress/ingress.yaml

      - name: Wait for rollout
        run: |
          for service in pos-service inventory-service auth-service frontend; do
            kubectl rollout status deployment/$service -n prism --timeout=120s
          done
          echo "All services deployed successfully!"
