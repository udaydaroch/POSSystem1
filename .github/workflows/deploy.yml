# ── Mini Prism CI/CD Pipeline ─────────────────────────────────────────────────
# On push to main:
# 1. Run tests
# 2. Terraform — provision EC2 t3.micro + RDS db.t3.micro (free tier)
# 3. Build Docker images and push to ECR
# 4. SSH into EC2, pull images, restart with Docker Compose

name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2

jobs:

  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Test pos-service
        run: mvn test -f services/pos-service/pom.xml

      - name: Test inventory-service
        run: mvn test -f services/inventory-service/pom.xml

      - name: Test auth-service
        run: mvn test -f services/auth-service/pom.xml

  # ── Job 2: Terraform ──────────────────────────────────────────────────────────
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      instance-id:  ${{ steps.tf-output.outputs.instance_id }}
      ec2-ip:       ${{ steps.tf-output.outputs.ec2_ip }}
      rds-host:     ${{ steps.tf-output.outputs.rds_host }}
      ecr-registry: ${{ steps.tf-output.outputs.ecr_registry }}
    defaults:
      run:
        working-directory: terraform/envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture outputs
        id: tf-output
        run: |
          echo "instance_id=$(terraform output -raw ec2_instance_id)"  >> $GITHUB_OUTPUT
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)"       >> $GITHUB_OUTPUT
          echo "rds_host=$(terraform output -raw rds_endpoint)"      >> $GITHUB_OUTPUT
          echo "ecr_registry=$(terraform output -raw ecr_registry)"  >> $GITHUB_OUTPUT

  # ── Job 3: Build & push images ────────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: terraform
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push backend services
        env:
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          for service in pos-service inventory-service auth-service; do
            docker build --platform linux/amd64 \
              -t $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG \
              -t $ECR_REGISTRY/mini-prism/$service:latest \
              ./services/$service
            docker push $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG
            docker push $ECR_REGISTRY/mini-prism/$service:latest
          done

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/mini-prism/frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/mini-prism/frontend:latest

  # ── Job 4: Deploy to EC2 via SSM (no SSH required) ───────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Wait for SSM agent
        env:
          INSTANCE_ID: ${{ needs.terraform.outputs.instance-id }}
        run: |
          for i in {1..20}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online"
              break
            fi
            echo "Attempt $i/20 — status: $STATUS, waiting 15s..."
            sleep 15
            if [ "$i" -eq 20 ]; then
              echo "SSM agent not online after 5 min — check the instance in AWS console"
              exit 1
            fi
          done

      - name: Deploy via SSM
        env:
          INSTANCE_ID:  ${{ needs.terraform.outputs.instance-id }}
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:    ${{ needs.build-and-push.outputs.image-tag }}
          RDS_HOST:     ${{ needs.terraform.outputs.rds-host }}
          DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, subprocess, sys

          # base64-encode file contents so special characters can't break anything
          compose_b64 = base64.b64encode(open("docker-compose.prod.yml", "rb").read()).decode()
          env_text = "\n".join([
              "ECR_REGISTRY=" + os.environ["ECR_REGISTRY"],
              "IMAGE_TAG="    + os.environ["IMAGE_TAG"],
              "DB_HOST="      + os.environ["RDS_HOST"],
              "DB_PASSWORD="  + os.environ["DB_PASSWORD"],
              "JWT_SECRET="   + os.environ["JWT_SECRET"],
          ])
          env_b64 = base64.b64encode(env_text.encode()).decode()

          ecr    = os.environ["ECR_REGISTRY"]
          region = os.environ.get("AWS_REGION", "ap-southeast-2")

          commands = [
              "set -e",
              "mkdir -p /opt/mini-prism",
              f"echo {compose_b64} | base64 -d > /opt/mini-prism/docker-compose.yml",
              f"echo {env_b64} | base64 -d > /opt/mini-prism/.env",
              f"aws ecr get-login-password --region {region} | docker login --username AWS --password-stdin {ecr}",
              "cd /opt/mini-prism && docker compose pull",
              "cd /opt/mini-prism && docker compose --env-file .env up -d --remove-orphans",
              "docker compose -f /opt/mini-prism/docker-compose.yml ps",
          ]

          instance_id = os.environ["INSTANCE_ID"]
          send = subprocess.run([
              "aws", "ssm", "send-command",
              "--instance-id", instance_id,
              "--document-name", "AWS-RunShellScript",
              "--parameters", json.dumps({"commands": commands}),
              "--query", "Command.CommandId",
              "--output", "text",
          ], check=True, capture_output=True, text=True)
          cmd_id = send.stdout.strip()
          print(f"SSM Command ID: {cmd_id}")

          subprocess.run([
              "aws", "ssm", "wait", "command-executed",
              "--command-id", cmd_id,
              "--instance-id", instance_id,
          ], check=True)

          inv = subprocess.run([
              "aws", "ssm", "get-command-invocation",
              "--command-id", cmd_id,
              "--instance-id", instance_id,
          ], check=True, capture_output=True, text=True)
          data = json.loads(inv.stdout)
          print(data.get("StandardOutputContent", ""))
          if data.get("StandardErrorContent"):
              print(data["StandardErrorContent"], file=sys.stderr)
          if data["Status"] != "Success":
              print(f"Deploy failed — status: {data['Status']}", file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Print app URL
        run: |
          echo "Deployed! App URL: http://${{ needs.terraform.outputs.ec2-ip }}"
