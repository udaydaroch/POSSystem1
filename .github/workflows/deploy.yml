# ── Mini Prism CI/CD Pipeline ─────────────────────────────────────────────────
# On push to main:
# 1. Run tests
# 2. Terraform — provision EC2 t3.micro + RDS db.t3.micro (free tier)
# 3. Build Docker images and push to ECR
# 4. SSH into EC2, pull images, restart with Docker Compose

name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2

jobs:

  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Test pos-service
        run: mvn test -f services/pos-service/pom.xml

      - name: Test inventory-service
        run: mvn test -f services/inventory-service/pom.xml

      - name: Test auth-service
        run: mvn test -f services/auth-service/pom.xml

  # ── Job 2: Terraform ──────────────────────────────────────────────────────────
  terraform:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      ec2-ip:       ${{ steps.tf-output.outputs.ec2_ip }}
      rds-host:     ${{ steps.tf-output.outputs.rds_host }}
      ecr-registry: ${{ steps.tf-output.outputs.ecr_registry }}
    defaults:
      run:
        working-directory: terraform/envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Capture outputs
        id: tf-output
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)"       >> $GITHUB_OUTPUT
          echo "rds_host=$(terraform output -raw rds_endpoint)"      >> $GITHUB_OUTPUT
          echo "ecr_registry=$(terraform output -raw ecr_registry)"  >> $GITHUB_OUTPUT

  # ── Job 3: Build & push images ────────────────────────────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: terraform
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push backend services
        env:
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          for service in pos-service inventory-service auth-service; do
            docker build --platform linux/amd64 \
              -t $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG \
              -t $ECR_REGISTRY/mini-prism/$service:latest \
              ./services/$service
            docker push $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG
            docker push $ECR_REGISTRY/mini-prism/$service:latest
          done

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/mini-prism/frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/mini-prism/frontend:latest

  # ── Job 4: Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mini-prism
          chmod 600 ~/.ssh/mini-prism

      - name: Configure AWS credentials (for ECR login on EC2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Wait for EC2 SSH
        run: |
          EC2_IP="${{ needs.terraform.outputs.ec2-ip }}"
          connected=false
          for i in {1..20}; do
            if ssh -i ~/.ssh/mini-prism -o StrictHostKeyChecking=no \
                 -o ConnectTimeout=10 -o BatchMode=yes \
                 ec2-user@$EC2_IP "echo ok"; then
              connected=true
              break
            fi
            echo "Attempt $i/20 — waiting 15s..."
            sleep 15
          done
          if [ "$connected" != "true" ]; then
            echo "EC2 not reachable after 20 attempts (~5 min). Check the instance in the AWS console."
            exit 1
          fi

      - name: Copy docker-compose file
        run: |
          scp -i ~/.ssh/mini-prism -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ec2-user@${{ needs.terraform.outputs.ec2-ip }}:/opt/mini-prism/docker-compose.yml

      - name: Deploy
        env:
          EC2_IP:       ${{ needs.terraform.outputs.ec2-ip }}
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:    ${{ needs.build-and-push.outputs.image-tag }}
          RDS_HOST:     ${{ needs.terraform.outputs.rds-host }}
          DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
        run: |
          ssh -i ~/.ssh/mini-prism -o StrictHostKeyChecking=no ec2-user@$EC2_IP "cat > /opt/mini-prism/.env" <<EOF
          ECR_REGISTRY=${ECR_REGISTRY}
          IMAGE_TAG=${IMAGE_TAG}
          DB_HOST=${RDS_HOST}
          DB_PASSWORD=${DB_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          EOF

          ssh -i ~/.ssh/mini-prism -o StrictHostKeyChecking=no ec2-user@$EC2_IP "bash -s" <<REMOTE
          set -e
          aws ecr get-login-password --region ${AWS_REGION} \
            | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          cd /opt/mini-prism
          docker compose pull
          docker compose --env-file .env up -d --remove-orphans
          docker compose ps
          REMOTE

      - name: Print app URL
        run: |
          echo "✅ Deployed! App is at: http://${{ needs.terraform.outputs.ec2-ip }}"
