# ── Teardown Demo EKS ─────────────────────────────────────────────────────────
# Run this after your demo to avoid ongoing charges.
# Destroys the EKS cluster, RDS, VPC, and all associated resources.

name: Teardown Demo (EKS)

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2

jobs:
  teardown:
    name: Terraform destroy (EKS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/envs/demo

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform destroy
        run: terraform destroy -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"
