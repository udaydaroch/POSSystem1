# ── Demo Deploy — EKS ─────────────────────────────────────────────────────────
# Triggered manually from GitHub Actions → Run workflow.
# Spins up EKS, deploys all services, and prints the ALB URL.
# Run the teardown-demo workflow when you're done to avoid charges.

name: Deploy Demo (EKS)

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2

jobs:

  # ── Job 1: Provision infrastructure ─────────────────────────────────────────
  terraform:
    name: Terraform apply (EKS)
    runs-on: ubuntu-latest
    outputs:
      cluster-name:  ${{ steps.tf-out.outputs.cluster_name }}
      ecr-registry:  ${{ steps.tf-out.outputs.ecr_registry }}
      lbc-role-arn:  ${{ steps.tf-out.outputs.lbc_role_arn }}
    defaults:
      run:
        working-directory: terraform/envs/demo

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform apply
        run: terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Capture outputs
        id: tf-out
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "ecr_registry=$(terraform output -raw ecr_registry)"  >> $GITHUB_OUTPUT
          echo "lbc_role_arn=$(terraform output -raw lbc_role_arn)"  >> $GITHUB_OUTPUT

  # ── Job 2: Build & push Docker images ────────────────────────────────────────
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: terraform
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push backend services
        env:
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          for service in pos-service inventory-service auth-service; do
            docker build --platform linux/amd64 \
              -t $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG \
              -t $ECR_REGISTRY/mini-prism/$service:latest \
              ./services/$service
            docker push $ECR_REGISTRY/mini-prism/$service:$IMAGE_TAG
            docker push $ECR_REGISTRY/mini-prism/$service:latest
          done

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:     ${{ steps.tag.outputs.tag }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/mini-prism/frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/mini-prism/frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/mini-prism/frontend:latest

  # ── Job 3: Deploy to EKS ──────────────────────────────────────────────────────
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.terraform.outputs.cluster-name }} \
            --region ${{ env.AWS_REGION }}

      - name: Install AWS Load Balancer Controller
        env:
          LBC_ROLE_ARN:  ${{ needs.terraform.outputs.lbc-role-arn }}
          CLUSTER_NAME:  ${{ needs.terraform.outputs.cluster-name }}
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=$CLUSTER_NAME \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=$LBC_ROLE_ARN" \
            --wait --timeout 5m
          kubectl rollout status deployment/aws-load-balancer-controller \
            -n kube-system --timeout=120s
          # Wait for the webhook TLS to be ready before applying any Services
          sleep 15

      - name: Create namespace
        run: kubectl apply -f kubernetes/services/services.yaml

      - name: Create Kubernetes secrets
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:  ${{ secrets.JWT_SECRET }}
        run: |
          # PostgreSQL runs in-cluster at postgres:5432
          kubectl create secret generic prism-db-secret \
            --from-literal=pos-db-url="jdbc:postgresql://postgres:5432/prism_pos" \
            --from-literal=inventory-db-url="jdbc:postgresql://postgres:5432/prism_inventory" \
            --from-literal=auth-db-url="jdbc:postgresql://postgres:5432/prism_auth" \
            --from-literal=db-username="prism" \
            --from-literal=db-password="$DB_PASSWORD" \
            --namespace prism --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic prism-jwt-secret \
            --from-literal=jwt-secret="$JWT_SECRET" \
            --namespace prism --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PostgreSQL
        run: |
          kubectl apply -f kubernetes/postgres/postgres.yaml
          kubectl rollout status deployment/postgres -n prism --timeout=120s

      - name: Apply manifests
        env:
          ECR_REGISTRY: ${{ needs.terraform.outputs.ecr-registry }}
          IMAGE_TAG:     ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          ACCOUNT_ID=$(echo $ECR_REGISTRY | cut -d. -f1)

          # Substitute placeholders in manifests and apply
          for f in kubernetes/deployments/*.yaml; do
            sed \
              -e "s|ACCOUNT_ID|$ACCOUNT_ID|g" \
              -e "s|IMAGE_TAG|$IMAGE_TAG|g" \
              "$f" | kubectl apply -f -
          done

          kubectl apply -f kubernetes/ingress/ingress.yaml

      - name: Wait for ALB and print URL
        run: |
          echo "Waiting for ALB to be provisioned (up to 5 min)..."
          for i in $(seq 1 30); do
            HOST=$(kubectl get ingress prism-ingress -n prism \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOST" ]; then
              echo ""
              echo "============================================"
              echo "  Demo is live at: http://$HOST"
              echo "============================================"
              exit 0
            fi
            echo "Attempt $i/30 — ALB not ready yet, waiting 10s..."
            sleep 10
          done
          echo ""
          echo "=== Ingress events ==="
          kubectl describe ingress prism-ingress -n prism || true
          echo ""
          echo "=== LBC logs (last 50 lines) ==="
          kubectl logs -n kube-system \
            -l app.kubernetes.io/name=aws-load-balancer-controller \
            --tail=50 || true
          exit 1
